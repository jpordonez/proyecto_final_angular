<!--
  Objetivo del ejercicio:
  Recibir datos con input() y emitir eventos con output().

  Que debe implementar el estudiante:
  - Agregar un boton "Eliminar" que emita otro output.
  - Mostrar un estilo diferente si student().active es false.

  Resultado esperado:
  El padre decide que hacer cuando el hijo emite el evento.
-->
<article class="student-card" [class.inactive]="!student().active">
  <h3>{{ student().fullName }}</h3>
  <p>{{ student().email }}</p>
  <p>Estado: {{ student().activeLabel }}</p>

  <button type="button" (click)="selectStudent()">Seleccionar</button>
  <button type="button" (click)="requestRemove()">Eliminar</button>
</article>
