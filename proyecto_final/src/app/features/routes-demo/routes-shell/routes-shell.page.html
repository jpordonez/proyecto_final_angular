<!--
  Objetivo del ejercicio:
  Mostrar que una ruta puede contener otro router-outlet.

  Que debe implementar el estudiante:
  Agregar enlaces secundarios para nuevas rutas hijas.

  Resultado esperado:
  /rutas muestra la lista y /rutas/:id muestra detalle.
-->
<section class="section">
  <h1>Rutas hijas y parametros</h1>
  <div class="actions">
    <a routerLink="/rutas" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      Lista
    </a>
    <a routerLink="/rutas/crear" routerLinkActive="active">Crear</a>
  </div>
  <router-outlet />
</section>
